syntax = "proto3";package proto;message Leaderboard {  repeated LeaderboardEntry entries = 1;}message LeaderboardEntry {  int64 uid = 1;  fixed64 hash = 2;  PlayerInfo player_info = 3;  int32 top = 4;}message PlayerInfo {  PlayerData data = 1;  int32 unk = 3;  int32 score = 4;}message PlayerData {  int64 uid = 1;  int32 status = 2;  string nickname = 3;  string server = 5;  int32 level = 6;  int32 xp = 7;  int32 banner = 11;  int32 avatar = 12;  int32 platform = 14;  int32 score = 15;  bool premium = 17;  int32 avatar_id = 18;  int64 account_id = 19;  int32 region = 20;  int32 playtime = 21;  bool hidden_player = 23;  int32 character_id = 24;  int32 ranking = 30;  int32 tier = 31;  bytes session_id = 32;  int32 title_id = 33;  int32 platform2 = 35;  int32 ranking2 = 36;  int32 battle_pass_level = 39;  PlayerSettings settings = 41;  int32 last_login = 44;  bytes encrypted_data = 46;  int32 ff_icon_title_commonicon = 48;  SubscriptionInfo subscription = 49;  string game_version = 50;  bool crossplay = 52;  bool new_player = 53;  repeated Achievement achievements = 61;  SeasonStats season_stats = 63;}message PlayerSettings {  int32 control_scheme = 3;  bytes video_settings = 4;  string language = 5;  bool push_notifications = 7;  bool newsletter_subscription = 8;}message SubscriptionInfo {  bool active = 2;  int32 type = 3;}message Achievement {  int32 type = 1;  int32 progress = 2;  AchievementData data = 3;}message AchievementData {  int32 category = 1;  int32 current = 2;  int32 target = 3;  int32 reward = 4;  bool completed = 5;}message SeasonStats {  repeated SeasonProgress progress = 1;}message SeasonProgress {  int32 season = 1;  int32 start_date = 2;  int32 current_level = 3;}